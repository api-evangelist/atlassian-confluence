openapi: 3.1.0
info:
  title: Atlassian Confluence Cloud REST API (v1 and v2)
  version: "2.0"
  description: |
    Confluence Cloud exposes both a v1 REST API (under /wiki/rest/api) for
    legacy content operations and a v2 REST API (under /wiki/api/v2) for
    cursor-paginated access to pages, spaces, attachments, labels, and
    comments. The v2 surface is the recommended one for new integrations.
  contact:
    name: Atlassian Developer
    url: https://developer.atlassian.com/cloud/confluence/
servers:
  - url: https://your-domain.atlassian.net/wiki
    description: Tenant Confluence Cloud site
    variables:
      your-domain:
        default: example
        description: Your Atlassian site subdomain
tags:
  - name: Content (v1)
    description: Legacy /rest/api/content operations
  - name: Search (v1)
    description: CQL-based search
  - name: Pages (v2)
    description: Modern cursor-paginated pages
  - name: Spaces (v2)
    description: Spaces and space settings
  - name: Labels (v2)
    description: Labels and label-targeted listings
paths:
  /rest/api/content/search:
    get:
      tags: [Search (v1)]
      summary: Search content using CQL
      parameters:
        - { name: cql,              in: query, required: true, schema: { type: string } }
        - { name: cqlcontext,       in: query, schema: { type: string } }
        - { name: cursor,           in: query, schema: { type: string } }
        - { name: expand,           in: query, schema: { type: array, items: { type: string } } }
        - { name: start,            in: query, schema: { type: integer, default: 0 } }
        - { name: limit,            in: query, schema: { type: integer, default: 25 } }
        - { name: includeArchivedSpaces, in: query, schema: { type: boolean } }
      responses:
        "200": { description: Search results }
        "401": { description: Unauthorized }
      security:
        - basicAuth: []
        - oauth2: ["read:confluence-content.summary"]
  /rest/api/content/archive:
    post:
      tags: [Content (v1)]
      summary: Archive one or more pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
      responses:
        "202": { description: Accepted; returns a long task ID }
      security:
        - basicAuth: []
        - oauth2: ["write:confluence-content"]
  /rest/api/content/blueprint/instance/{draftId}:
    post:
      tags: [Content (v1)]
      summary: Publish a legacy draft created from a blueprint
      parameters:
        - { name: draftId, in: path, required: true, schema: { type: string } }
        - { name: status,  in: query, schema: { type: string, enum: [draft, current] } }
        - { name: expand,  in: query, schema: { type: array, items: { type: string } } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentInput"
      responses:
        "200": { description: Content }
      security:
        - basicAuth: []
        - oauth2: ["write:confluence-content"]
    put:
      tags: [Content (v1)]
      summary: Publish a shared draft created from a blueprint
      parameters:
        - { name: draftId, in: path, required: true, schema: { type: string } }
        - { name: status,  in: query, schema: { type: string, enum: [draft, current] } }
        - { name: expand,  in: query, schema: { type: array, items: { type: string } } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentInput"
      responses:
        "200": { description: Content }
      security:
        - basicAuth: []
        - oauth2: ["write:confluence-content"]

  /api/v2/pages:
    get:
      tags: [Pages (v2)]
      summary: List pages
      parameters:
        - { name: id,          in: query, schema: { type: array, items: { type: integer } } }
        - { name: space-id,    in: query, schema: { type: array, items: { type: integer } } }
        - { name: sort,        in: query, schema: { type: string } }
        - { name: status,      in: query, schema: { type: array, items: { type: string, enum: [current, archived, deleted, trashed] } } }
        - { name: title,       in: query, schema: { type: string } }
        - { name: body-format, in: query, schema: { type: string, enum: [storage, atlas_doc_format, view] } }
        - { name: cursor,      in: query, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 25 } }
      responses:
        "200": { description: Page list }
      security:
        - basicAuth: []
        - oauth2: ["read:page:confluence"]
    post:
      tags: [Pages (v2)]
      summary: Create a page
      parameters:
        - { name: embedded,   in: query, schema: { type: boolean } }
        - { name: private,    in: query, schema: { type: boolean } }
        - { name: root-level, in: query, schema: { type: boolean } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spaceId]
              properties:
                spaceId: { type: string }
                status:  { type: string, enum: [current, draft] }
                title:   { type: string }
                parentId:{ type: string }
                body:
                  type: object
                  properties:
                    representation: { type: string, enum: [storage, atlas_doc_format, wiki] }
                    value:          { type: string }
      responses:
        "200": { description: Page created }
      security:
        - basicAuth: []
        - oauth2: ["write:page:confluence"]
  /api/v2/pages/{id}:
    get:
      tags: [Pages (v2)]
      summary: Get a page
      parameters:
        - { name: id,          in: path,  required: true, schema: { type: integer } }
        - { name: body-format, in: query, schema: { type: string } }
        - { name: get-draft,   in: query, schema: { type: boolean } }
      responses:
        "200": { description: Page }
      security:
        - basicAuth: []
        - oauth2: ["read:page:confluence"]
    put:
      tags: [Pages (v2)]
      summary: Update a page
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Page updated }
      security:
        - basicAuth: []
        - oauth2: ["write:page:confluence"]
    delete:
      tags: [Pages (v2)]
      summary: Delete a page
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }
      security:
        - basicAuth: []
        - oauth2: ["write:page:confluence"]
  /api/v2/pages/{id}/title:
    put:
      tags: [Pages (v2)]
      summary: Update only the page title
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Page updated }
      security:
        - basicAuth: []
        - oauth2: ["write:page:confluence"]
  /api/v2/spaces:
    get:
      tags: [Spaces (v2)]
      summary: List spaces
      parameters:
        - { name: ids,                in: query, schema: { type: array, items: { type: integer } } }
        - { name: keys,               in: query, schema: { type: array, items: { type: string } } }
        - { name: type,               in: query, schema: { type: string, enum: [global, personal, collaboration, knowledge_base] } }
        - { name: status,             in: query, schema: { type: string, enum: [current, archived] } }
        - { name: labels,             in: query, schema: { type: array, items: { type: string } } }
        - { name: sort,               in: query, schema: { type: string } }
        - { name: description-format, in: query, schema: { type: string } }
        - { name: include-icon,       in: query, schema: { type: boolean } }
        - { name: cursor,             in: query, schema: { type: string } }
        - { name: limit,              in: query, schema: { type: integer, default: 25 } }
      responses:
        "200": { description: Space list }
      security:
        - basicAuth: []
        - oauth2: ["read:space:confluence"]
    post:
      tags: [Spaces (v2)]
      summary: Create a space
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                key:         { type: string }
                alias:       { type: string }
                description: { type: object }
                roleAssignments:
                  type: array
                  items: { type: object }
                copySpaceAccessConfiguration: { type: boolean }
                createPrivateSpace:           { type: boolean }
                templateKey:                  { type: string }
      responses:
        "200": { description: Space created }
      security:
        - basicAuth: []
        - oauth2: ["write:space:confluence"]
  /api/v2/spaces/{id}:
    get:
      tags: [Spaces (v2)]
      summary: Get a space
      parameters:
        - { name: id,                          in: path,  required: true, schema: { type: integer } }
        - { name: description-format,          in: query, schema: { type: string } }
        - { name: include-icon,                in: query, schema: { type: boolean } }
        - { name: include-operations,          in: query, schema: { type: boolean } }
        - { name: include-properties,          in: query, schema: { type: boolean } }
        - { name: include-permissions,         in: query, schema: { type: boolean } }
        - { name: include-role-assignments,    in: query, schema: { type: boolean } }
        - { name: include-labels,              in: query, schema: { type: boolean } }
      responses:
        "200": { description: Space }
      security:
        - basicAuth: []
        - oauth2: ["read:space:confluence"]
  /api/v2/spaces/{id}/pages:
    get:
      tags: [Spaces (v2)]
      summary: List pages in a space
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Page list }
      security:
        - basicAuth: []
        - oauth2: ["read:page:confluence"]
  /api/v2/labels/{id}/pages:
    get:
      tags: [Labels (v2)]
      summary: List pages with the given label
      parameters:
        - { name: id,          in: path,  required: true, schema: { type: integer } }
        - { name: space-id,    in: query, schema: { type: array, items: { type: integer } } }
        - { name: body-format, in: query, schema: { type: string } }
        - { name: sort,        in: query, schema: { type: string } }
        - { name: cursor,      in: query, schema: { type: string } }
        - { name: limit,       in: query, schema: { type: integer, default: 25 } }
      responses:
        "200": { description: Page list }
      security:
        - basicAuth: []
        - oauth2: ["read:page:confluence"]
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Basic auth using your Atlassian account email and an API token
        generated at https://id.atlassian.com/manage-profile/security/api-tokens.
    oauth2:
      type: oauth2
      description: OAuth 2.0 (3LO) for Atlassian Cloud Connect/Forge apps
      flows:
        authorizationCode:
          authorizationUrl: https://auth.atlassian.com/authorize
          tokenUrl: https://auth.atlassian.com/oauth/token
          scopes:
            read:confluence-content.summary: Read content summaries
            read:confluence-content.all: Read full content
            write:confluence-content: Create, update, and delete content
            read:page:confluence: Read pages (v2)
            write:page:confluence: Create and update pages (v2)
            read:space:confluence: Read spaces (v2)
            write:space:confluence: Create and update spaces (v2)
  schemas:
    ContentInput:
      type: object
      required: [version, title, type]
      properties:
        version:
          type: object
          properties:
            number: { type: integer }
        title: { type: string }
        type:  { type: string, enum: [page, blogpost] }
        status:{ type: string }
        space:
          type: object
          properties:
            key: { type: string }
        ancestors:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
