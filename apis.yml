aid: atlassian-confluence
name: Atlassian Confluence
description: >-
  Atlassian Confluence is a team collaboration and wiki platform for creating,
  organizing, and discussing work with your team. It provides APIs for managing
  content, spaces, pages, users, and search across Confluence Cloud
  deployments.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Collaboration
  - Wiki
  - Documentation
  - Knowledge Management
  - Content Management
url: >-
  https://raw.githubusercontent.com/api-evangelist/atlassian-confluence/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
